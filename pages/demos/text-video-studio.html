<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Video Studio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111d;
      --panel: #0f172a;
      --panel-2: #132238;
      --border: #243249;
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #040a13, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      padding: 24px;
      border-right: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, black 8%);
      overflow: auto;
    }
    .preview-wrap {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    p { color: var(--muted); line-height: 1.5; }
    .panel {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      padding: 16px;
      margin-bottom: 16px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    button {
      background: var(--accent);
      color: #001018;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    input[type="range"] {
      width: 100%;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    label {
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #091220;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    .preview-panel {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #030712;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .preview-stage {
      width: min(100%, 1100px);
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border) 70%, white 30%);
      box-shadow: 0 30px 90px rgb(0 0 0 / 0.4);
      background: #020617;
    }
    .preview-stage svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }
    .list button {
      width: 100%;
      text-align: left;
      border-radius: 12px;
      background: #0b1525;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px;
      font-weight: 500;
    }
    .list button.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Text Video Studio</h1>
      <p>Preview and tweak the semantic text-video project format directly in the browser using the same timeline and layer model as the offline renderer.</p>

      <section class="panel">
        <h2>Playback</h2>
        <div class="controls">
          <button id="play-pause">Play</button>
          <button id="reset-project" class="secondary">Reset</button>
          <span id="time-label" class="meta">0.00s / 0.00s</span>
        </div>
        <div class="field">
          <label for="scrubber">Timeline</label>
          <input id="scrubber" type="range" min="0" max="1" step="0.001" value="0">
        </div>
      </section>

      <section class="panel">
        <h2>Scenes</h2>
        <div class="field">
          <label for="scene-select">Scene</label>
          <select id="scene-select"></select>
        </div>
      </section>

      <section class="panel">
        <h2>Layers</h2>
        <div class="field">
          <label for="layer-select">Layer</label>
          <select id="layer-select"></select>
        </div>
        <pre id="layer-meta" class="meta" style="white-space:pre-wrap;max-height:160px;overflow:auto;font-size:11px;margin:8px 0 0"></pre>
      </section>

      <section class="panel">
        <h2>Edit layer</h2>
        <div class="field">
          <label for="text-input">Text content</label>
          <textarea id="text-input"></textarea>
        </div>
        <div class="field">
          <label for="color-input">Color / fill</label>
          <input id="color-input" type="text" placeholder="#ffffff">
        </div>
        <div class="field">
          <label for="x-input">X position</label>
          <input id="x-input" type="number" step="1">
        </div>
        <div class="field">
          <label for="y-input">Y position</label>
          <input id="y-input" type="number" step="1">
        </div>
        <div class="field">
          <label for="width-input">Width / size</label>
          <input id="width-input" type="number" step="1">
        </div>
        <div class="field">
          <label for="opacity-input">Opacity</label>
          <input id="opacity-input" type="number" step="0.05" min="0" max="1">
        </div>
      </section>
    </aside>

    <main class="preview-wrap">
      <section class="preview-panel">
        <div id="preview" class="preview-stage"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./text-video-studio.ts"></script>
</body>
</html>
